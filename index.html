<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASOLAB</title>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #000000;
            --gray-mid: #D9D9D9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .gallery-container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        /* ====== 左侧：控制枢纽 ====== */
        .left-panel {
            width: 50vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            background: var(--bg-color);
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -3px; 
            text-transform: uppercase;
            transform: scaleY(0.85); 
            transform-origin: left top;
        }

        /* 核心装置 */
        .signal-core {
            align-self: center;
            margin-top: -15vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* 默认纯黑圆球 */
        .void-sphere {
            width: 240px; /* 稍微放大一点，镇住 9 宫格 */
            height: 240px;
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); 
            transition: filter 0.4s ease;
        }

        @keyframes endless-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .is-receiving .void-sphere {
            animation: endless-spin 4s linear infinite; 
        }
        
        .is-paused .void-sphere {
            filter: grayscale(50%) brightness(0.7);
        }

        .sys-status {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #000;
            border-radius: 50%;
            transition: opacity 0.3s;
        }

        .is-receiving .status-dot {
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ====== 右侧：3x3 完美矩阵 ====== */
        .right-panel {
            width: 50vw;
            margin-left: 50vw;
            min-height: 100vh;
            padding: 60px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 从 2 栏改为 3 栏 */
            gap: 20px; /* 缩小间距，让 9 个方块更紧凑 */
            align-content: center; /* 整体居中 */
        }

        .track-item {
            aspect-ratio: 1 / 1;
            background-color: var(--gray-mid);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* 统一的噪点滤镜，没放图片前像水泥灰，放了图片后覆盖在图片上增加胶片质感 */
        .track-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .track-item:hover { background-color: #000; }
        .track-item:hover::before { opacity: 1; }

        .track-info {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 3;
            background-color: rgba(0,0,0,0.4); /* 悬停时压暗背景，让白色字更清晰 */
        }

        .track-item:hover .track-info { opacity: 1; }

        .track-title {
            font-size: 11px; /* 3栏比较紧凑，字号微调保证长歌名不换行 */
            font-weight: 700;
            letter-spacing: 2px;
            color: #FFFFFF;
            text-transform: uppercase;
            text-align: center;
            padding: 0 10px;
        }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .gallery-container { flex-direction: column; }
            .left-panel {
                width: 100vw;
                height: 100vw;
                position: relative;
                padding: 30px;
            }
            .brand-logo { top: 30px; left: 30px; position: absolute; }
            .signal-core { margin-top: 0; transform: scale(0.85); }
            .right-panel { 
                width: 100vw; 
                margin-left: 0; 
                padding: 30px; 
                gap: 15px; 
                grid-template-columns: repeat(3, 1fr); /* 手机端依然保持 3 栏网格 */
            }
            .track-title { font-size: 9px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        
        <!-- 左侧 -->
        <div class="left-panel">
            <div class="brand-logo">CASOLAB</div>
            
            <div class="signal-core" id="player-container">
                <div class="void-sphere" id="cover-sphere"></div>
                <div class="sys-status">
                    <div class="status-dot"></div>
                    <span id="status-text">SYSTEM_STANDBY</span>
                </div>
            </div>
        </div>

        <!-- 右侧：9 宫格矩阵 -->
        <div class="right-panel">
            <!-- 01 -->
            <div class="track-item" data-src="demo_01.mp3" data-cover="cover_01.jpg" data-title="WHAT'S YR SIGN">
                <div class="track-info">
                    <div class="track-title">WHAT'S YR SIGN</div>
                </div>
            </div>
            <!-- 02 -->
            <div class="track-item" data-src="demo_02.mp3" data-cover="cover_02.jpg" data-title="DEMO.1">
                <div class="track-info">
                    <div class="track-title">DEMO.1</div>
                </div>
            </div>
            <!-- 03 -->
            <div class="track-item" data-src="demo_03.mp3" data-cover="cover_03.jpg" data-title="HARD BRASS+">
                <div class="track-info">
                    <div class="track-title">HARD BRASS+</div>
                </div>
            </div>
            <!-- 04 -->
            <div class="track-item" data-src="demo_04.mp3" data-cover="cover_04.jpg" data-title="ANYTHING U WANT">
                <div class="track-info">
                    <div class="track-title">ANYTHING U WANT</div>
                </div>
            </div>
            <!-- 05 -->
            <div class="track-item" data-src="demo_05.mp3" data-cover="cover_05.jpg" data-title="MIXDOWN2">
                <div class="track-info">
                    <div class="track-title">MIXDOWN2</div>
                </div>
            </div>
            <!-- 06 -->
            <div class="track-item" data-src="demo_06.mp3" data-cover="cover_06.jpg" data-title="ALL TO ME">
                <div class="track-info">
                    <div class="track-title">ALL TO ME</div>
                </div>
            </div>
            <!-- 07 -->
            <div class="track-item" data-src="demo_07.mp3" data-cover="cover_07.jpg" data-title="SPECIAL NIGHT">
                <div class="track-info">
                    <div class="track-title">SPECIAL NIGHT</div>
                </div>
            </div>
            <!-- 08 -->
            <div class="track-item" data-src="demo_08.mp3" data-cover="cover_08.jpg" data-title="END">
                <div class="track-info">
                    <div class="track-title">END</div>
                </div>
            </div>
            <!-- 09 -->
            <div class="track-item" data-src="demo_09.mp3" data-cover="cover_09.jpg" data-title="NEVERLIE">
                <div class="track-info">
                    <div class="track-title">NEVERLIE</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 音频引擎 -->
    <audio id="audio-engine" preload="auto"></audio>

    <script>
        const playerContainer = document.getElementById('player-container');
        const coverSphere = document.getElementById('cover-sphere');
        const audioEngine = document.getElementById('audio-engine');
        const statusText = document.getElementById('status-text');
        const trackItems = document.querySelectorAll('.track-item');

        let currentTrackTitle = null;

        trackItems.forEach(item => {
            item.addEventListener('click', () => {
                const trackSrc = item.getAttribute('data-src');
                const trackTitle = item.getAttribute('data-title');
                const trackCover = item.getAttribute('data-cover'); 

                if (currentTrackTitle === trackTitle && !audioEngine.paused) {
                    abortTransmission();
                    return;
                }

                initiateTransmission(trackSrc, trackTitle, trackCover);
            });
        });

        function initiateTransmission(src, title, coverUrl) {
            playerContainer.classList.remove('is-paused');
            statusText.innerText = "LOADING...";
            
            if (currentTrackTitle !== title) {
                audioEngine.src = src;
                currentTrackTitle = title;
                coverSphere.style.backgroundImage = `url('${coverUrl}')`;
            }
            
            audioEngine.play().then(() => {
                playerContainer.classList.add('is-receiving');
                statusText.innerText = title + " [PLAYING]";
            }).catch(e => {
                playerContainer.classList.add('is-receiving');
                statusText.innerText = title + " [PLAYING]";
            });
        }

        function abortTransmission() {
            audioEngine.pause();
            playerContainer.classList.remove('is-receiving');
            playerContainer.classList.add('is-paused'); 
            statusText.innerText = currentTrackTitle + " [PAUSED]";
        }

        audioEngine.addEventListener('ended', () => {
            playerContainer.classList.remove('is-receiving');
            playerContainer.classList.remove('is-paused');
            coverSphere.style.backgroundImage = 'none'; 
            statusText.innerText = "SYSTEM_STANDBY";
            currentTrackTitle = null;
        });
    </script>
</body>
</html>
