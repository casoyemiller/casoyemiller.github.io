<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>CASOLAB</title>
    <style>
        /* 抹除网页痕迹，变身为纯粹的黑色画布 */
        body { margin: 0; overflow: hidden; background-color: #020204; font-family: monospace; }
        
        /* 极度克制的 UI 坐标 */
        .ui-text { 
            position: absolute; 
            color: rgba(255, 255, 255, 0.2); 
            font-size: 10px; 
            letter-spacing: 0.6em; 
            z-index: 10; 
            pointer-events: none; 
        }
        .top-left { top: 40px; left: 40px; }
        .bottom-center { bottom: 40px; left: 50%; transform: translateX(-50%); }
    </style>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div class="ui-text top-left">CASOLAB</div>
    <div class="ui-text bottom-center">ALONE_IN_THE_UNIVERSE</div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // 1. 基础空间：无尽的深渊与浓雾
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020204); // 80% 的极致黑
        scene.fog = new THREE.FogExp2(0x0a0514, 0.025); // 幽暗的紫雾

        // 摄像机镜头拉远，强化人的渺小
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2.5, 18); 

        // 开启电影级渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        document.body.appendChild(renderer.domElement);

        // 2. 神圣感的核心：Bloom (泛光/光晕特效)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.05; // 只有被强光打到的边缘才会发光
        bloomPass.strength = 1.8;  // 光晕的浓度（粉紫色）
        bloomPass.radius = 1.2;    // 光晕的扩散面积

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // 3. 巨大的原型物体：暗淡星球
        const planetGeo = new THREE.SphereGeometry(8, 64, 64);
        const planetMat = new THREE.MeshStandardMaterial({
            color: 0x050505, // 像湿润黑石头一样的底色
            roughness: 0.8,
            metalness: 0.3
        });
        const planet = new THREE.Mesh(planetGeo, planetMat);
        planet.position.set(0, -6, 0); // 故意让它沉下去，形成巨大的地平线
        scene.add(planet);

        // 4. 画龙点睛的极小主体：孤独的人
        const personGeo = new THREE.BoxGeometry(0.08, 0.25, 0.08); 
        const personMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); // 纯黑剪影
        const person = new THREE.Mesh(personGeo, personMat);
        person.position.set(0, 2.12, 0); // 站在球体绝对的顶端
        scene.add(person);

        // 5. 情绪打光 (Kanye 式的舞台追光)
        // 从球体后方打过来的强烈的粉紫逆光，会在球体边缘产生神圣的轮廓光
        const backLight = new THREE.DirectionalLight(0xC65BFF, 4.0);
        backLight.position.set(0, 5, -10);
        scene.add(backLight);

        // 环境底光：非常微弱的深紫，保证球体暗面不会彻底死黑
        const ambientLight = new THREE.AmbientLight(0x0D0718, 2.0);
        scene.add(ambientLight);

        // 6. 星空/尘埃粒子
        const starGeo = new THREE.BufferGeometry();
        const starMat = new THREE.PointsMaterial({ color: 0x7A4DFF, size: 0.04, transparent: true, opacity: 0.5 });
        const starPos = [];
        for(let i=0; i<1500; i++) {
            // 将粒子散布在巨大的空间中
            starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 7. 时间的流逝：极其缓慢的呼吸感
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // 极慢的自转，人几乎察觉不到，但画面是活的
            planet.rotation.y = t * 0.015;
            stars.rotation.y = t * 0.005;
            stars.rotation.x = t * 0.002;

            // 必须用 composer 渲染才能使泛光生效
            composer.render();
        }
        animate();

        // 浏览器窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
